<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Фон: тёмно-синий скруглённый квадрат -->
  <rect width="32" height="32" rx="8" fill="#0F172A"/>
  <!-- Буква O с градиентом (синий → фиолетовый акцент, стиль Oxford) -->
  <text
    x="16"
    y="23"
    font-family="Georgia, serif"
    font-size="22"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#grad)"
  >O</text>
  <!-- Маленькая подчёркивающая линия -->
  <line x1="9" y1="26" x2="23" y2="26" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
</svg>
